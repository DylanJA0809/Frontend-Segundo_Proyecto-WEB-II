<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TicoAutos | Activar cuenta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-bg min-h-screen flex items-center justify-center px-4">
  <section class="pop-in w-full max-w-md rounded-3xl backdrop-blur border border-zinc-800 p-7 card-glow text-center"
    style="background: var(--card);">

    <div class="logo-wrap justify-center">
      <img class="logo-img" src="../img/ticoautos-logo.png" alt="TicoAutos Logo" />
      <div>
        <h1 class="text-xl font-semibold tracking-wide">
          <span class="text-red-500">Tico</span>Autos
        </h1>
      </div>
    </div>

    <p id="message" class="text-zinc-300 text-lg">Activando tu cuenta...</p>

    <a href="./login.html" id="loginLink"
      class="hidden mt-6 inline-block w-full rounded-2xl bg-red-600 hover:bg-red-500 transition px-4 py-3 font-semibold">
      Ir al Login
    </a>
  </section>

  <script src="../JS/API/auth.js"></script>
  <script src="../JS/activate.js"></script>
</body>
</html>
